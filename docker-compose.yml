services:
  app:
    image: ai-quiz-master:latest
    build: .
    container_name: ai-quiz-master
    ports:
      - "3000:3000"
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - NODE_ENV=production
    restart: unless-stopped

