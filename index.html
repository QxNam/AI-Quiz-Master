<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>AI Quiz Master - Cấp 1</title>
    
    <!-- PWA Meta Tags -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="AI Quiz Master - Cấp 1">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#4f46e5">
    <link rel="manifest" href="manifest.json">
    
    <!-- App Icons (Sử dụng CDN icon mẫu) -->
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/5607/5607313.png">
    <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/5607/5607313.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    
    <!-- MathJax 3 Configuration -->
    <script>
      window.MathJax = {
        tex: {
          inlineMath: [['$', '$'], ['\\(', '\\)']],
          displayMath: [['$$', '$$'], ['\\[', '\\]']],
          processEscapes: true
        },
        options: {
          ignoreHtmlClass: 'tex2jax_ignore',
          processHtmlClass: 'tex2jax_process'
        },
        startup: {
          typeset: false
        },
        chtml: {
          displayAlign: 'center'
        }
      };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: {
              serif: ['"Times New Roman"', 'Times', 'serif'],
              sans: ['Inter', 'system-ui', 'sans-serif'],
            },
          }
        }
      }
    </script>

    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap');
      
      body {
        font-family: 'Inter', sans-serif;
        transition: background-color 0.3s ease;
        -webkit-tap-highlight-color: transparent;
        overscroll-behavior-y: contain; /* Ngăn pull-to-refresh khi làm app */
      }

      .markdown-content {
        line-height: 1.8;
        font-size: 1.15rem;
      }
      
      .quiz-text-content {
        font-family: "Times New Roman", Times, serif;
      }

      mjx-container {
        display: inline-block;
        margin: 0 0.3em !important;
        vertical-align: middle;
        outline: none !important;
      }
      mjx-container[display="true"] {
        display: block;
        margin: 1.5rem auto !important;
        padding: 1rem;
        background: rgba(99, 102, 241, 0.03);
        border-radius: 0.75rem;
        overflow-x: auto;
      }
      .dark mjx-container[display="true"] {
        background: rgba(255, 255, 255, 0.03);
      }
      
      /* Smooth Transitions */
      .page-transition {
        animation: fadeIn 0.4s ease-out;
      }
    </style>
    <script type="importmap">
    {
      "imports": {
        "@google/genai": "https://esm.sh/@google/genai@^1.39.0",
        "react": "https://esm.sh/react@^19.2.4",
        "react-dom": "https://esm.sh/react-dom@^19.2.4",
        "react-dom/client": "https://esm.sh/react-dom@^19.2.4/client",
        "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
        "react/": "https://esm.sh/react@^19.2.4/"
      }
    }
    </script>
  <link rel="stylesheet" href="/index.css">
</head>
  <body class="bg-slate-50 dark:bg-slate-950 text-slate-900 dark:text-slate-100 tex2jax_ignore select-none">

  <script type="module" src="/index.tsx"></script>
</body>
</html>
